<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>간단한 CV 작성기</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1, h2 {
            color: #333;
        }
        .section {
            margin-bottom: 20px;
        }
        .info {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>이름</h1>
        <p>이메일: your.email@example.com | 전화번호: 010-1234-5678</p>
    </header>

    <main>
        <section class="section">
            <h2>학력</h2>
            <div class="info">
                <h3>대학교 이름</h3>
                <p>전공: 학과명</p>
                <p>졸업년도: 20XX년</p>
            </div>
        </section>

        <section class="section">
            <h2>경력</h2>
            <div class="info">
                <h3>회사명</h3>
                <p>직위: 직책</p>
                <p>근무 기간: 20XX년 ~ 20XX년</p>
                <ul>
                    <li>주요 업무 내용 1</li>
                    <li>주요 업무 내용 2</li>
                    <li>주요 업무 내용 3</li>
                </ul>
            </div>
        </section>

        <section class="section">
            <h2>기술 스택</h2>
            <ul>
                <li>기술 1</li>
                <li>기술 2</li>
                <li>기술 3</li>
            </ul>
        </section>

        <section class="section">
            <h2>프로젝트</h2>
            <div class="info">
                <h3>프로젝트 이름</h3>
                <p>기간: 20XX년 ~ 20XX년</p>
                <p>설명: 프로젝트에 대한 간단한 설명을 적어주세요.</p>
            </div>
        </section>
    </main>
</body>
</html>
