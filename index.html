<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포트폴리오</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 커스텀 스타일 */
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-black text-white">
    <div id="root"></div>

    <script type="text/babel">
        // Header 컴포넌트
        function Header() {
            const [isOpen, setIsOpen] = React.useState(false);
            
            return (
                <header className="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-sm">
                    <div className="container mx-auto px-4 py-4 flex justify-between items-center">
                        <h1 className="text-2xl font-bold">Your Name</h1>
                        <nav className="hidden md:flex space-x-4">
                            <button className="text-white hover:text-gray-300">Home</button>
                            <button className="text-white hover:text-gray-300">Experience</button>
                            <button className="text-white hover:text-gray-300">Skills</button>
                            <button className="text-white hover:text-gray-300">Contact</button>
                        </nav>
                        <button className="md:hidden" onClick={() => setIsOpen(!isOpen)}>
                            Menu
                        </button>
                    </div>
                    {isOpen && (
                        <nav className="md:hidden bg-gray-900 p-4">
                            <div className="flex flex-col space-y-2">
                                <button className="text-white text-left">Home</button>
                                <button className="text-white text-left">Experience</button>
                                <button className="text-white text-left">Skills</button>
                                <button className="text-white text-left">Contact</button>
                            </div>
                        </nav>
                    )}
                </header>
            );
        }

        // Hero 컴포넌트
        function Hero() {
            return (
                <section className="flex items-center justify-center min-h-screen bg-gradient-to-b from-black to-gray-900">
                    <div className="text-center">
                        <h1 className="text-5xl font-bold mb-4 animate-fade-in">Your Name</h1>
                        <p className="text-xl mb-8 animate-fade-in">Web Developer & Designer</p>
                        <button className="px-6 py-2 border border-white rounded-md hover:bg-white hover:text-black transition-colors animate-fade-in">
                            View My Work
                        </button>
                    </div>
                </section>
            );
        }

        // Experience 컴포넌트
        function Experience() {
            const experiences = [
                {
                    title: "Senior Web Developer",
                    company: "Tech Solutions Inc.",
                    period: "2020 - Present",
                    description: "Led a team of developers in creating responsive web applications using React and Next.js. Implemented state management solutions and optimized performance for high-traffic websites."
                },
                {
                    title: "Full Stack Developer",
                    company: "Digital Innovations Co.",
                    period: "2017 - 2020",
                    description: "Developed and maintained full-stack applications using Node.js and React. Collaborated with UX designers to implement user-friendly interfaces and improved application performance by 40%."
                },
                {
                    title: "Junior Developer",
                    company: "StartUp Ventures",
                    period: "2015 - 2017",
                    description: "Assisted in the development of web applications using JavaScript and PHP. Gained experience in agile methodologies and version control systems."
                }
            ];

            return (
                <section className="py-20 bg-gray-900">
                    <div className="container mx-auto px-4">
                        <h2 className="text-3xl font-bold mb-10 text-center">My Experience</h2>
                        <div className="space-y-8">
                            {experiences.map((exp, index) => (
                                <div key={index} className="bg-gray-800 border border-gray-700 rounded-lg p-6">
                                    <h3 className="text-xl font-semibold mb-2">{exp.title}</h3>
                                    <p className="text-gray-400 mb-2">{exp.company} | {exp.period}</p>
                                    <p className="text-gray-300">{exp.description}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        // Skills 컴포넌트
        function Skills() {
            const skills = ["HTML", "CSS", "JavaScript", "React", "Next.js", "Node.js", "Python", "Git"];

            return (
                <section className="py-20 bg-gray-900">
                    <div className="container mx-auto px-4">
                        <h2 className="text-3xl font-bold mb-10 text-center text-white">My Skills</h2>
                        <div className="flex flex-wrap justify-center gap-4">
                            {skills.map((skill, index) => (
                                <span key={index} className="px-4 py-2 bg-gray-800 text-white border border-gray-700 rounded-md">
                                    {skill}
                                </span>
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        // Contact 컴포넌트
        function Contact() {
            return (
                <section className="py-20 bg-gray-900">
                    <div className="container mx-auto px-4">
                        <h2 className="text-3xl font-bold mb-10 text-center">Contact Me</h2>
                        <form className="max-w-md mx-auto space-y-4">
                            <input
                                type="text"
                                placeholder="Your Name"
                                className="w-full p-2 bg-gray-800 border border-gray-700 rounded-md text-white"
                            />
                            <input
                                type="email"
                                placeholder="Your Email"
                                className="w-full p-2 bg-gray-800 border border-gray-700 rounded-md text-white"
                            />
                            <textarea
                                placeholder="Your Message"
                                className="w-full p-2 bg-gray-800 border border-gray-700 rounded-md text-white h-32"
                            ></textarea>
                            <button
                                type="submit"
                                className="w-full py-2 bg-white text-black rounded-md hover:bg-gray-200 transition-colors"
                            >
                                Send Message
                            </button>
                        </form>
                    </div>
                </section>
            );
        }

        // Footer 컴포넌트
        function Footer() {
            return (
                <footer className="bg-black py-8">
                    <div className="container mx-auto px-4 text-center">
                        <p>&copy; 2023 Your Name. All rights reserved.</p>
                    </div>
                </footer>
            );
        }

        // App 컴포넌트
        function App() {
            return (
                <div className="min-h-screen bg-black text-white">
                    <Header />
                    <main>
                        <Hero />
                        <Experience />
                        <Skills />
                        <Contact />
                    </main>
                    <Footer />
                </div>
            );
        }

        // 앱 렌더링
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
